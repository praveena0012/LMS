<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Books</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="dashboard-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="logo-box">
          <div class="logo-icon">📘</div>
          <span class="logo-text">LMS</span>
        </div>

        <nav class="menu">
          <a href="user-dashboard.html" class="menu-item">
            <span class="menu-icon">▣</span>
            <span>Dashboard</span>
          </a>

          <a href="search-books.html" class="menu-item active">
            <span class="menu-icon">▥</span>
            <span>Search Books</span>
          </a>

          <a href="my-books.html" class="menu-item">
            <span class="menu-icon">⌕</span>
            <span>My Books</span>
          </a>

          <a href="availability.html" class="menu-item">
            <span class="menu-icon">🗓</span>
            <span>Availability</span>
          </a>
        </nav>
      </div>

      <div class="logout-wrap">
        <button class="logout-btn">Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-area">
      <div class="content-wrap">

        <!-- Page Top -->
        <div class="search-top-bar">
          <h1>Search Books</h1>

          <div class="top-user">
            <div class="top-user-icon">👤</div>
            <span>John Doe</span>
          </div>
        </div>

        <!-- Search Box -->
        <div class="search-filter-box">
          <div class="search-input-wrap">
            <input
              type="text"
              id="searchInput"
              placeholder="Search Books"
              onkeyup="filterBooks()"
            />
            <span class="search-icon">⌕</span>
          </div>

          <div class="category-box">
            <button class="category-btn" onclick="toggleDropdown()">
              <span>✪</span>
              <span id="selectedCategory">Catogaries</span>
              <span>﹀</span>
            </button>

            <div class="dropdown-menu" id="dropdownMenu">
              <div onclick="selectCategory('All')">All</div>
              <div onclick="selectCategory('Novel')">Novel</div>
              <div onclick="selectCategory('Programming')">Programming</div>
              <div onclick="selectCategory('Children')">Children</div>
            </div>
          </div>
        </div>

        <!-- Books Grid -->
        <div class="books-grid" id="booksGrid">

          <div class="book-card" data-title="To Kill a Mockingbird" data-author="Harper Lee" data-category="Novel">
            <img src="https://images.unsplash.com/photo-1541963463532-d68292c34b19?w=300" alt="To Kill a Mockingbird">
            <h3>To kill a mockingbird</h3>
            <p>Harper Lee</p>
            <button onclick="borrowBook('To Kill a Mockingbird')">Borrow</button>
          </div>

          <div class="book-card" data-title="Clean Code" data-author="Robert C. Martin" data-category="Programming">
            <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=300" alt="Clean Code">
            <h3>Clean Code</h3>
            <p>Robert C. Martin</p>
            <button onclick="borrowBook('Clean Code')">Borrow</button>
          </div>

          <div class="book-card" data-title="Java Programming" data-author="Herbert Schildt" data-category="Programming">
            <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=300" alt="Java Programming">
            <h3>Java Programming</h3>
            <p>Herbert Schildt</p>
            <button onclick="borrowBook('Java Programming')">Borrow</button>
          </div>

          <div class="book-card" data-title="Matilda" data-author="Roald Dahl" data-category="Children">
            <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=300" alt="Matilda">
            <h3>Matilda</h3>
            <p>Rold dahl</p>
            <button onclick="borrowBook('Matilda')">Borrow</button>
          </div>

        </div>

      </div>
    </main>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
